theme:
  name: material
  font:
    text: Noto Sans JP
    code: Inconsolata
  palette:
    - scheme: default
      primary: blue grey
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: images/sken.jpeg
  favicon: images/sken.jpeg
  
extra:
  consent:
    title: Cookie consent
    description:
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  consent:
    actions:
      - accept
      - manage
      - reject
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - header.autohide
    - navigation.tracking
  generator: false
  social:
    - icon: fontawesome/brands/square-x-twitter
      link: https://x.com/Flying___eagle
      name: mebiusbox2 on Twitter
    - icon: fontawesome/brands/github
      link: https://github.com/Altairu

copyright: "&copy; 2025 -Altair-"
repo_url: https://github.com/Altairu/sken_training_materials
repo_name: Altairu/sken_training_materials
markdown_extensions:
    - pymdownx.highlight
extra_javascript: 
  - js/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - admonition